<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18293A"/>
      <stop offset="1" stop-color="#0F1E2D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.74" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#1A8F85" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1A8F85" stop-opacity="0"/>
    </radialGradient>
    <marker id="agrey" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#6B86A0"/>
    </marker>
    <marker id="aamber" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#D97238"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- dotted grid texture (left) -->
  <g fill="#2A3E54" opacity="0.5">
    <!-- generated dots -->
    <g>
      <circle cx="60"  cy="70"  r="2"/><circle cx="110" cy="70"  r="2"/><circle cx="160" cy="70"  r="2"/>
      <circle cx="60"  cy="120" r="2"/><circle cx="110" cy="120" r="2"/><circle cx="160" cy="120" r="2"/>
      <circle cx="60"  cy="170" r="2"/><circle cx="110" cy="170" r="2"/>
    </g>
  </g>

  <!-- ── logo mark + wordmark ── -->
  <g transform="translate(80, 70)">
    <g stroke="#28A89E" stroke-width="4.5" stroke-linecap="round">
      <line x1="26" y1="8" x2="6" y2="46"/>
      <line x1="26" y1="8" x2="46" y2="46"/>
      <line x1="6"  y1="46" x2="46" y2="46"/>
    </g>
    <g fill="#28A89E">
      <circle cx="26" cy="8"  r="7"/>
      <circle cx="6"  cy="46" r="7"/>
      <circle cx="46" cy="46" r="7"/>
    </g>
    <text x="72" y="44" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="40" font-weight="700" letter-spacing="-1" fill="#E2EAF2">istio<tspan fill="#28A89E">-viz</tspan></text>
  </g>

  <!-- ── headline ── -->
  <text x="80" y="250" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="74" font-weight="700" letter-spacing="-2.5" fill="#FFFFFF">Your routes,</text>
  <text x="80" y="332" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="74" font-weight="700" letter-spacing="-2.5" fill="#28A89E">made visible.</text>

  <!-- ── subhead ── -->
  <text x="82" y="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="27" fill="#9BB8D4">Visualize effective Istio L7 routing topology</text>
  <text x="82" y="438" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="27" fill="#9BB8D4">from your manifests &#8212; or live from your cluster.</text>

  <!-- ── command chips ── -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="22" font-weight="700">
    <g>
      <rect x="82"  y="486" width="116" height="44" rx="8" fill="#1B3640" stroke="#28A89E" stroke-width="1.5"/>
      <text x="140" y="515" text-anchor="middle" fill="#5EC89A">render</text>
    </g>
    <g>
      <rect x="214" y="486" width="100" height="44" rx="8" fill="#1B3640" stroke="#28A89E" stroke-width="1.5"/>
      <text x="264" y="515" text-anchor="middle" fill="#5EC89A">trace</text>
    </g>
    <g>
      <rect x="330" y="486" width="86" height="44" rx="8" fill="#1B3640" stroke="#28A89E" stroke-width="1.5"/>
      <text x="373" y="515" text-anchor="middle" fill="#5EC89A">lint</text>
    </g>
    <g>
      <rect x="432" y="486" width="108" height="44" rx="8" fill="#1B3640" stroke="#28A89E" stroke-width="1.5"/>
      <text x="486" y="515" text-anchor="middle" fill="#5EC89A">watch</text>
    </g>
  </g>

  <!-- ── routing diagram motif (right) ── -->
  <g transform="translate(770, 150)">
    <!-- gateway -->
    <rect x="90" y="0" width="190" height="56" rx="11" fill="#1B3640" stroke="#28A89E" stroke-width="2"/>
    <text x="185" y="24" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="700" fill="#5EC89A">Gateway</text>
    <text x="185" y="43" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11.5" fill="#28A89E">:443 &#183; *.example.com</text>

    <line x1="185" y1="56" x2="185" y2="92" stroke="#6B86A0" stroke-width="2" marker-end="url(#agrey)"/>

    <!-- host -->
    <rect x="78" y="96" width="214" height="46" rx="23" fill="#243547" stroke="#3A526B" stroke-width="2"/>
    <text x="185" y="124" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#E2EAF2">api.example.com</text>

    <path d="M135 142 C 135 178 60 178 60 200" stroke="#6B86A0" stroke-width="2" fill="none" marker-end="url(#agrey)"/>
    <path d="M235 142 C 235 178 310 178 310 200" stroke="#D97238" stroke-width="2" fill="none" marker-end="url(#aamber)"/>

    <!-- rule A -->
    <rect x="-12" y="202" width="200" height="50" rx="9" fill="#243547" stroke="#3A526B" stroke-width="2"/>
    <text x="88" y="222" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#E2EAF2">GET /api/v1/*</text>
    <text x="88" y="240" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#6B86A0">&#8594; cart-svc &#183; 100%</text>

    <!-- rule B (traced) -->
    <rect x="222" y="202" width="200" height="50" rx="9" fill="#2E1E10" stroke="#D97238" stroke-width="2"/>
    <text x="322" y="222" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#E2EAF2">POST /checkout</text>
    <text x="322" y="240" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#D97238">traced request &#8595;</text>

    <line x1="88"  y1="252" x2="88"  y2="280" stroke="#6B86A0" stroke-width="2" marker-end="url(#agrey)"/>
    <line x1="322" y1="252" x2="322" y2="280" stroke="#D97238" stroke-width="2" marker-end="url(#aamber)"/>

    <!-- services -->
    <rect x="-12" y="282" width="200" height="40" rx="8" fill="#1A8F85"/>
    <text x="88" y="307" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#FFFFFF">cart-svc : 8080</text>

    <rect x="222" y="282" width="200" height="40" rx="8" fill="#D97238"/>
    <text x="322" y="307" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#FFFFFF">checkout-svc : 8080</text>
  </g>

  <!-- ── footer url ── -->
  <text x="80" y="582" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#6B86A0">istio-viz.wckd14.xyz</text>
  <text x="1120" y="582" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#6B86A0">offline &#183; read-only &#183; no cluster required</text>
</svg>
