name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  binaries:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: node22-linux-x64,  platform: linux-x64  }
          - { os: ubuntu-latest,  target: node22-linux-arm64, platform: linux-arm64 }
          - { os: macos-latest,   target: node22-macos-arm64, platform: macos-arm64 }
          - { os: windows-latest, target: node22-win-x64,    platform: windows-x64 }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run bundle

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          npx pkg dist/bundle.cjs --target ${{ matrix.target }} --output istio-viz
          tar czf istio-viz_${{ github.ref_name }}_${{ matrix.platform }}.tar.gz istio-viz

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npx pkg dist/bundle.cjs --target ${{ matrix.target }} --output istio-viz.exe
          Compress-Archive istio-viz.exe istio-viz_${{ github.ref_name }}_${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: istio-viz_${{ github.ref_name }}_${{ matrix.platform }}.*

  release:
    name: Create GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} release/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
