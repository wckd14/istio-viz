name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { target: node22-linux-x64,   os: ubuntu-latest,  artifact: istio-viz-linux-x64       }
          - { target: node22-linux-arm64,  os: ubuntu-latest,  artifact: istio-viz-linux-arm64      }
          - { target: node22-macos-x64,    os: macos-13,       artifact: istio-viz-macos-x64        }
          - { target: node22-macos-arm64,  os: macos-latest,   artifact: istio-viz-macos-arm64      }
          - { target: node22-win-x64,      os: windows-latest, artifact: istio-viz-windows-x64.exe  }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run bundle
      - run: npx pkg dist/bundle.cjs --target ${{ matrix.target }} --output release/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
