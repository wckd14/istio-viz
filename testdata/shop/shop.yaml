# Synthetic "shop" fixture exercising trace mode, weights, modifiers and lints.
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: shop-gateway
  namespace: prod
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
    hosts:
    - "shop.example.com"
    - "*.shop.example.com"
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "shop.example.com"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: shop-routes
  namespace: prod
spec:
  hosts:
  - shop.example.com
  gateways:
  - shop-gateway
  http:
  - name: canary-api
    match:
    - uri:
        prefix: /api/v2
      headers:
        x-canary:
          exact: "true"
    route:
    - destination:
        host: api
        subset: v2
        port:
          number: 8080
      weight: 90
    - destination:
        host: api
        subset: v1
        port:
          number: 8080
      weight: 10
    retries:
      attempts: 3
      perTryTimeout: 2s
    timeout: 5s
  - name: api
    match:
    - uri:
        prefix: /api
    rewrite:
      uri: /
    route:
    - destination:
        host: api
        subset: v1
        port:
          number: 8080
    mirror:
      host: api-shadow
      port:
        number: 8080
  - name: old-redirect
    match:
    - uri:
        exact: /old
    redirect:
      uri: /new
      redirectCode: 301
  - name: fallback
    match:
    - uri:
        prefix: /
    route:
    - destination:
        host: web
        port:
          number: 80
  - name: unreachable-after-fallback
    match:
    - uri:
        prefix: /never
    route:
    - destination:
        host: web
        port:
          number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: shop-debug
  namespace: prod
spec:
  hosts:
  - debug.shop.example.com
  gateways:
  - shop-gateway
  http:
  - match:
    - headers:
        x-debug:
          exact: "1"
    route:
    - destination:
        host: debug-svc
        port:
          number: 8080
  - route:
    - destination:
        host: web
        port:
          number: 9999
      weight: 60
    - destination:
        host: web
        port:
          number: 80
      weight: 30
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: lonely
  namespace: prod
spec:
  hosts:
  - other.example.org
  gateways:
  - shop-gateway
  http:
  - route:
    - destination:
        host: web
        port:
          number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ghost
  namespace: prod
spec:
  hosts:
  - ghost.example.com
  gateways:
  - missing-gateway
  http:
  - route:
    - destination:
        host: web
        port:
          number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: internal-orders
  namespace: prod
spec:
  hosts:
  - orders
  http:
  - match:
    - uri:
        prefix: /v2
    route:
    - destination:
        host: orders
        subset: missing-subset
        port:
          number: 8080
  - route:
    - destination:
        host: orders
        port:
          number: 8080
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: api
  namespace: prod
spec:
  host: api
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: prod
spec:
  ports:
  - port: 8080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: prod
spec:
  ports:
  - port: 80
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: prod
spec:
  ports:
  - port: 8080
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: api-shadow
  namespace: prod
spec:
  ports:
  - port: 8080
    name: http
