# ACME backing Services across four namespaces (prod, payments, internal, edge).
# `api` is intentionally multi-port (http + grpc) so destinations must name a
# port; all clean VirtualServices below do. Short destination hosts in a VS get
# expanded to <name>.<vs-namespace>.svc.cluster.local, so these names must line
# up with the namespaces the referencing VirtualServices live in.
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: prod
  labels: { app: web }
spec:
  selector: { app: web }
  ports:
  - { port: 80, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: web-canary
  namespace: prod
  labels: { app: web, track: canary }
spec:
  selector: { app: web, track: canary }
  ports:
  - { port: 80, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: static-assets
  namespace: prod
  labels: { app: static-assets }
spec:
  selector: { app: static-assets }
  ports:
  - { port: 80, name: http }
---
# Multi-port service: a destination MUST specify which port (8080 vs 9090).
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: prod
  labels: { app: api }
spec:
  selector: { app: api }
  ports:
  - { port: 8080, name: http }
  - { port: 9090, name: grpc }
---
apiVersion: v1
kind: Service
metadata:
  name: api-shadow
  namespace: prod
  labels: { app: api, role: shadow }
spec:
  selector: { app: api, role: shadow }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: prod
  labels: { app: cart }
spec:
  selector: { app: cart }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: prod
  labels: { app: catalog }
spec:
  selector: { app: catalog }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: prod
  labels: { app: search }
spec:
  selector: { app: search }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: recommendations
  namespace: prod
  labels: { app: recommendations }
spec:
  selector: { app: recommendations }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: prod
  labels: { app: auth }
spec:
  selector: { app: auth }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: internal-portal
  namespace: prod
  labels: { app: internal-portal }
spec:
  selector: { app: internal-portal }
  ports:
  - { port: 8080, name: http }
---
apiVersion: v1
kind: Service
metadata:
  name: stream
  namespace: prod
  labels: { app: stream }
spec:
  selector: { app: stream }
  ports:
  - { port: 9090, name: grpc }
---
# ---- payments namespace ----
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: payments
  labels: { app: payments }
spec:
  selector: { app: payments }
  ports:
  - { port: 8080, name: http }
